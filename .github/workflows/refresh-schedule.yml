# =============================================================================
# refresh-schedule.yml
#
# Weekly automation that re-runs generate_ics.py against the live official
# sources and commits any drift to fifa_fan_festival_toronto_2026.ics and
# data/cached_schedule.json. Also runs on push to validate generator/workflow
# logic changes immediately, and supports manual dispatch with a force-commit
# escape hatch (useful for nudging the cache even when the .ics is unchanged).
#
# Fallback strategy for branch protection:
#   We try a direct `git push` first (cheapest path; works on unprotected
#   default branches). If the push fails for ANY reason (protected branch,
#   required reviews, race with another job, etc.) we mark the step with
#   continue-on-error and the next step opens a PR via peter-evans/create-
#   pull-request@v6 using the same staged changes. This avoids needing to
#   probe the GitHub API for branch protection up front, and degrades
#   gracefully if protection is added later.
# =============================================================================

name: refresh-schedule

on:
  # Weekly cron — Mondays 11:17 UTC.
  # Toronto is UTC-4 (EDT) during the festival window (Jun–Jul 2026), so
  # 11:17 UTC ≈ 07:17 America/Toronto — early enough that any updates the
  # official site posted over the weekend get picked up before the Monday
  # workday, and the odd minute (:17) avoids the top-of-hour cron stampede
  # on GitHub's shared runners.
  schedule:
    - cron: '17 11 * * 1'

  # Manual trigger with an opt-in force-commit toggle (e.g. to refresh the
  # cached_schedule.json timestamp even when the .ics output is byte-identical).
  workflow_dispatch:
    inputs:
      force_commit:
        description: 'Commit even if the generator reports no diff'
        type: boolean
        required: false
        default: false

  # Validate logic changes the moment they land on the default branch.
  push:
    branches: [main, master]
    paths:
      - 'generate_ics.py'
      - 'requirements.txt'
      - '.github/workflows/refresh-schedule.yml'
      - 'data/cached_schedule.json'

# Serialize runs so two jobs never race each other on a commit/push.
concurrency:
  group: refresh-schedule
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write        # push commits to the default branch
      pull-requests: write   # open a fallback PR if the push is rejected

    steps:
      # -----------------------------------------------------------------------
      # 1. Check out the full history so subsequent commits/PR diffs are clean.
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      # -----------------------------------------------------------------------
      # 2. Pin Python and cache the pip download layer keyed on requirements.txt.
      # -----------------------------------------------------------------------
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      # -----------------------------------------------------------------------
      # 3. Install runtime deps (requests, beautifulsoup4).
      # -----------------------------------------------------------------------
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------------------------------------------------
      # 4. Run the generator. Non-zero exit fails the job — generate_ics.py
      #    only exits 1 when there's no live data AND no cache, which is a
      #    real regression worth alerting on.
      # -----------------------------------------------------------------------
      - name: Run schedule generator
        id: generate
        shell: bash
        run: |
          set -euo pipefail
          python generate_ics.py

      # -----------------------------------------------------------------------
      # 5. Detect file changes against HEAD. We care about three
      #    output artifacts the generator is allowed to mutate:
      #    the .ics, the cached schedule, and the README schedule
      #    table (kept in sync between SCHEDULE_TABLE_{START,END}
      #    markers by generate_ics.py).
      # -----------------------------------------------------------------------
      - name: Detect changes
        id: diff
        shell: bash
        run: |
          set -euo pipefail
          changed="$(git status --porcelain -- fifa_fan_festival_toronto_2026.ics data/cached_schedule.json README.md)"
          # Separately check the .ics — releases are gated on real .ics
          # content change; a cache-only or README-only refresh must NOT
          # cut a release.
          ics_changed_raw="$(git status --porcelain -- fifa_fan_festival_toronto_2026.ics)"
          if [[ -n "${changed}" ]]; then
            echo "has_changes=true" >> "${GITHUB_OUTPUT}"
            echo "Changes detected:"
            echo "${changed}"
          else
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
            echo "No changes detected."
          fi
          if [[ -n "${ics_changed_raw}" ]]; then
            echo "ics_changed=true" >> "${GITHUB_OUTPUT}"
          else
            echo "ics_changed=false" >> "${GITHUB_OUTPUT}"
          fi

      # -----------------------------------------------------------------------
      # 6. Run --check purely for human-readable logging in the job summary.
      #    `|| true` so a STATUS: error doesn't fail the job here (the real
      #    write-run in step 4 is the source of truth for success/failure).
      # -----------------------------------------------------------------------
      - name: Write job summary
        id: summary
        shell: bash
        run: |
          set -euo pipefail
          check_output="$(python generate_ics.py --check 2>&1 || true)"
          ics_file="fifa_fan_festival_toronto_2026.ics"
          cache_file="data/cached_schedule.json"
          ics_size="$(wc -c < "${ics_file}" | tr -d ' ')"
          cache_size="$(wc -c < "${cache_file}" | tr -d ' ')"
          vevent_count="$(grep -c '^BEGIN:VEVENT' "${ics_file}" || echo 0)"
          ts="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          today="$(date -u +'%Y-%m-%d')"
          echo "vevent_count=${vevent_count}" >> "${GITHUB_OUTPUT}"
          echo "today=${today}" >> "${GITHUB_OUTPUT}"
          {
            echo "## FIFA Fan Festival schedule refresh"
            echo ""
            echo "- **Run timestamp (UTC):** \`${ts}\`"
            echo "- **\`${ics_file}\`:** ${ics_size} bytes, **${vevent_count} VEVENTs**"
            echo "- **\`${cache_file}\`:** ${cache_size} bytes"
            echo "- **Has changes:** \`${{ steps.diff.outputs.has_changes }}\`"
            echo ""
            echo "### Generator \`--check\` output"
            echo ""
            echo '```'
            echo "${check_output}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      # -----------------------------------------------------------------------
      # 7a. Stage + commit + push. continue-on-error so a protected-branch
      #     rejection doesn't fail the job — step 7b will open a PR instead.
      # -----------------------------------------------------------------------
      - name: Commit and push changes
        id: push
        if: steps.diff.outputs.has_changes == 'true' || inputs.force_commit == true
        continue-on-error: true
        shell: bash
        env:
          VEVENT_COUNT: ${{ steps.summary.outputs.vevent_count }}
          TODAY: ${{ steps.summary.outputs.today }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add fifa_fan_festival_toronto_2026.ics data/cached_schedule.json README.md
          # --allow-empty supports the force_commit=true / no-diff path.
          git commit -m "chore(schedule): weekly auto-refresh — ${TODAY} (${VEVENT_COUNT} VEVENTs)" --allow-empty
          git push origin "HEAD:${GITHUB_REF_NAME}"
          # Capture the post-push commit SHA so the release tag (created
          # later in this job) points at the freshly-pushed commit, not
          # the original checkout SHA.
          pushed_sha="$(git rev-parse HEAD)"
          echo "pushed_sha=${pushed_sha}" >> "${GITHUB_OUTPUT}"

      # -----------------------------------------------------------------------
      # 7b. PR fallback when the direct push was rejected (e.g. branch
      #     protection requires reviews). Runs only if the push step ran
      #     but reported failure.
      # -----------------------------------------------------------------------
      - name: Open fallback pull request
        if: |
          steps.push.outcome == 'failure' &&
          (steps.diff.outputs.has_changes == 'true' || inputs.force_commit == true)
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/refresh-schedule-${{ github.run_id }}
          base: ${{ github.ref_name }}
          commit-message: "chore(schedule): weekly auto-refresh — ${{ steps.summary.outputs.today }} (${{ steps.summary.outputs.vevent_count }} VEVENTs)"
          title: "chore(schedule): weekly auto-refresh — ${{ steps.summary.outputs.today }} (${{ steps.summary.outputs.vevent_count }} VEVENTs)"
          body: |
            Automated weekly refresh of the FIFA Fan Festival Toronto 2026 schedule.

            Direct push to `${{ github.ref_name }}` was rejected (likely branch
            protection), so this PR carries the staged changes instead.

            - VEVENTs in `.ics`: **${{ steps.summary.outputs.vevent_count }}**
            - Triggered by: `${{ github.event_name }}`
            - Run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          committer: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          add-paths: |
            fifa_fan_festival_toronto_2026.ics
            data/cached_schedule.json
            README.md

      # -----------------------------------------------------------------------
      # 8a. Compute the next release tag.
      #
      # Versioning scheme: MAJOR pinned at 1, MINOR auto-increments. The very
      # first auto-release uses `v1.0`; subsequent releases bump MINOR
      # (`v1.1`, `v1.2`, …). Sort numerically by minor segment so `v1.10`
      # > `v1.9` (lexicographic sort would get this wrong).
      #
      # Gating: only runs when the .ics actually changed AND the direct
      # push succeeded. If the push step failed (PR fallback path was
      # taken), there is no commit on the default branch yet, so cutting
      # a tag here would be premature — skip and let the next successful
      # run produce the release.
      # -----------------------------------------------------------------------
      - name: Compute next release tag
        id: version
        if: |
          steps.diff.outputs.ics_changed == 'true' &&
          steps.push.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          # Refresh tag refs in case a previous run created one we don't have locally.
          git fetch --tags --force
          # Filter to the v1.X scheme; numeric sort by minor segment.
          highest="$(git tag --list 'v1.*' \
            | grep -E '^v1\.[0-9]+$' \
            | sort -t. -k2,2n \
            | tail -n 1 || true)"
          if [[ -z "${highest}" ]]; then
            # No prior auto-release — first one is v1.0 exactly.
            next_tag="v1.0"
            previous_tag=""
          else
            current_minor="${highest#v1.}"
            next_minor=$(( current_minor + 1 ))
            next_tag="v1.${next_minor}"
            previous_tag="${highest}"
          fi
          echo "next_tag=${next_tag}" >> "${GITHUB_OUTPUT}"
          echo "previous_tag=${previous_tag}" >> "${GITHUB_OUTPUT}"
          echo "Next tag: ${next_tag} (previous: ${previous_tag:-<none>})"

      # -----------------------------------------------------------------------
      # 8b. Build the release-notes body. Writes Markdown to a temp file
      #     whose path is exposed as a step output. Sections:
      #       - Header + timestamp + commit SHA
      #       - VEVENT count breakdown (festival days / match broadcasts /
      #         timed performances) parsed inline from the .ics
      #       - Diff vs previous tag: --stat plus added/removed SUMMARY:
      #         lines, each capped at 25 entries
      #       - Source status from `generate_ics.py --check`
      #       - Footer with import-instructions link
      # -----------------------------------------------------------------------
      - name: Build release notes
        id: notes
        if: |
          steps.diff.outputs.ics_changed == 'true' &&
          steps.push.outcome == 'success'
        shell: bash
        env:
          NEXT_TAG: ${{ steps.version.outputs.next_tag }}
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
          PUSHED_SHA: ${{ steps.push.outputs.pushed_sha }}
        run: |
          set -euo pipefail
          ics_file="fifa_fan_festival_toronto_2026.ics"
          notes_file="$(mktemp -t release-notes.XXXXXX.md)"
          ts="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          # --- Event-count breakdown (parse inline; cheap & deterministic) ---
          total="$(grep -c '^BEGIN:VEVENT' "${ics_file}" || echo 0)"
          # Festival day events use SUMMARY containing "FIFA Fan Festival"
          # and an opening-hours block; match broadcasts include "vs" or
          # known knockout-stage labels; remaining VEVENTs are treated as
          # timed performances/cultural items.
          festival_days="$(awk '/^BEGIN:VEVENT/{f=1;b=""} f{b=b"\n"$0} /^END:VEVENT/{if(b ~ /SUMMARY:.*Fan Festival.*Open Hours/) c++; f=0} END{print c+0}' "${ics_file}")"
          match_broadcasts="$(awk '/^BEGIN:VEVENT/{f=1;b=""} f{b=b"\n"$0} /^END:VEVENT/{if(b ~ /SUMMARY:.*(vs|Round of|Quarter-final|Semi-final|Bronze Final|Championship Final)/) c++; f=0} END{print c+0}' "${ics_file}")"
          performances=$(( total - festival_days - match_broadcasts ))
          if (( performances < 0 )); then performances=0; fi

          # --- Source status (rerun --check; tolerate non-zero exit) ---
          check_output="$(python generate_ics.py --check 2>&1 || true)"
          status_line="$(printf '%s\n' "${check_output}" | grep -E '^STATUS:' | head -n 1 || true)"
          if [[ -z "${status_line}" ]]; then
            status_line="STATUS: (not reported)"
          fi

          # --- Diff against previous release ---
          diff_section=""
          added_truncated=""
          removed_truncated=""
          added_count=0
          removed_count=0
          if [[ -n "${PREVIOUS_TAG}" ]]; then
            stat_block="$(git diff --stat "${PREVIOUS_TAG}..HEAD" -- fifa_fan_festival_toronto_2026.ics data/cached_schedule.json || true)"
            old_summaries="$(mktemp)"
            new_summaries="$(mktemp)"
            git show "${PREVIOUS_TAG}:fifa_fan_festival_toronto_2026.ics" 2>/dev/null \
              | grep '^SUMMARY:' | sort -u > "${old_summaries}" || true
            grep '^SUMMARY:' "${ics_file}" | sort -u > "${new_summaries}"
            added="$(comm -13 "${old_summaries}" "${new_summaries}" || true)"
            removed="$(comm -23 "${old_summaries}" "${new_summaries}" || true)"
            added_count="$(printf '%s' "${added}" | grep -c '^SUMMARY:' || true)"
            removed_count="$(printf '%s' "${removed}" | grep -c '^SUMMARY:' || true)"
            truncate_list() {
              local list="$1"; local count="$2"
              if (( count == 0 )); then
                printf -- '_(none)_\n'
                return
              fi
              printf '%s\n' "${list}" | head -n 25 | sed 's/^SUMMARY:/- /'
              if (( count > 25 )); then
                printf -- '- … and %d more\n' "$(( count - 25 ))"
              fi
            }
            added_truncated="$(truncate_list "${added}" "${added_count}")"
            removed_truncated="$(truncate_list "${removed}" "${removed_count}")"
            # Build diff_section line-by-line (avoid heredocs to keep
            # indentation consistent inside the YAML block scalar).
            diff_tmp="$(mktemp)"
            {
              printf '### Diff vs `%s`\n\n' "${PREVIOUS_TAG}"
              printf '```\n'
              printf '%s\n' "${stat_block:-(no file-level diff reported)}"
              printf '```\n\n'
              printf '**Added events (%s):**\n\n' "${added_count}"
              printf '%s\n\n' "${added_truncated}"
              printf '**Removed events (%s):**\n\n' "${removed_count}"
              printf '%s\n' "${removed_truncated}"
            } > "${diff_tmp}"
            diff_section="$(cat "${diff_tmp}")"
            # Expose truncated lists for the job-summary step (multi-line outputs).
            {
              echo "added_truncated<<NOTES_EOF"
              printf '%s\n' "${added_truncated}"
              echo "NOTES_EOF"
              echo "removed_truncated<<NOTES_EOF"
              printf '%s\n' "${removed_truncated}"
              echo "NOTES_EOF"
            } >> "${GITHUB_OUTPUT}"
          else
            diff_section="$(printf '### Diff vs previous release\n\n_This is the first auto-release (`%s`); no prior tag to diff against._\n' "${NEXT_TAG}")"
          fi

          # --- Assemble body ---
          {
            echo "## FIFA Fan Festival Toronto 2026 — schedule update"
            echo ""
            echo "- **Tag:** \`${NEXT_TAG}\`"
            echo "- **Generated (UTC):** \`${ts}\`"
            echo "- **Commit:** \`${PUSHED_SHA}\`"
            echo ""
            echo "### Event count"
            echo ""
            echo "- **Total VEVENTs:** ${total}"
            echo "- Festival day events: ${festival_days}"
            echo "- Match broadcasts: ${match_broadcasts}"
            echo "- Timed performances / cultural: ${performances}"
            echo ""
            echo "${diff_section}"
            echo ""
            echo "### Source status"
            echo ""
            echo "\`\`\`"
            echo "${status_line}"
            echo "\`\`\`"
            echo ""
            echo "### Import"
            echo ""
            echo "Download \`fifa_fan_festival_toronto_2026.ics\` from the assets below and follow the [import instructions in the README](${{ github.server_url }}/${{ github.repository }}/blob/${PUSHED_SHA}/README.md#import-instructions)."
          } > "${notes_file}"

          echo "notes_file=${notes_file}" >> "${GITHUB_OUTPUT}"
          echo "added_count=${added_count}" >> "${GITHUB_OUTPUT}"
          echo "removed_count=${removed_count}" >> "${GITHUB_OUTPUT}"
          echo "--- Release notes preview ---"
          cat "${notes_file}"

      # -----------------------------------------------------------------------
      # 8c. Cut the GitHub Release. Tag is created on the freshly-pushed
      #     commit (target_commitish = pushed_sha). The implicit
      #     GITHUB_TOKEN already has contents: write from the job-level
      #     permissions block — no extra secret needed.
      # -----------------------------------------------------------------------
      - name: Create GitHub release
        id: release
        if: |
          steps.diff.outputs.ics_changed == 'true' &&
          steps.push.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.next_tag }}
          name: FIFA Fan Festival Toronto 2026 — ${{ steps.version.outputs.next_tag }}
          body_path: ${{ steps.notes.outputs.notes_file }}
          files: fifa_fan_festival_toronto_2026.ics
          target_commitish: ${{ steps.push.outputs.pushed_sha }}
          make_latest: 'true'
          fail_on_unmatched_files: true

      # -----------------------------------------------------------------------
      # 8d. Append release info to the job summary so it's visible from
      #     the Actions run page without opening the Releases tab.
      # -----------------------------------------------------------------------
      - name: Append release info to job summary
        if: |
          steps.diff.outputs.ics_changed == 'true' &&
          steps.push.outcome == 'success' &&
          steps.release.outcome == 'success'
        shell: bash
        env:
          NEXT_TAG: ${{ steps.version.outputs.next_tag }}
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
          ADDED_COUNT: ${{ steps.notes.outputs.added_count }}
          REMOVED_COUNT: ${{ steps.notes.outputs.removed_count }}
          ADDED_TRUNCATED: ${{ steps.notes.outputs.added_truncated }}
          REMOVED_TRUNCATED: ${{ steps.notes.outputs.removed_truncated }}
        run: |
          set -euo pipefail
          release_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${NEXT_TAG}"
          {
            echo ""
            echo "## 🚀 Released \`${NEXT_TAG}\`"
            echo ""
            echo "- **Release page:** <${release_url}>"
            echo "- **Previous tag:** \`${PREVIOUS_TAG:-<none>}\`"
            echo "- **Added events:** ${ADDED_COUNT:-0}"
            echo "- **Removed events:** ${REMOVED_COUNT:-0}"
            if [[ -n "${ADDED_TRUNCATED:-}" ]]; then
              echo ""
              echo "**Added (truncated to 25):**"
              echo ""
              printf '%s\n' "${ADDED_TRUNCATED}"
            fi
            if [[ -n "${REMOVED_TRUNCATED:-}" ]]; then
              echo ""
              echo "**Removed (truncated to 25):**"
              echo ""
              printf '%s\n' "${REMOVED_TRUNCATED}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      # -----------------------------------------------------------------------
      # 9. Always upload the generated outputs for 30-day forensic access.
      # -----------------------------------------------------------------------
      - name: Upload schedule artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fifa-schedule-${{ github.run_id }}
          path: |
            fifa_fan_festival_toronto_2026.ics
            data/cached_schedule.json
          retention-days: 30
          if-no-files-found: warn

      # -----------------------------------------------------------------------
      # 9. On any failure, write a triage block to the job summary.
      # -----------------------------------------------------------------------
      - name: Failure diagnostics
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## ❌ Refresh failed"
            echo ""
            echo "Likely causes (in rough order of frequency):"
            echo ""
            echo "1. **Live sources unreachable AND no cached snapshot** — \`generate_ics.py\` exits 1 only in this state. Check whether \`data/cached_schedule.json\` exists in the repo."
            echo "2. **Network blocked from GitHub-hosted runner** — torontofwc26.ca / toronto.ca / fifa.com may be rate-limiting or geo-blocking; re-run later."
            echo "3. **Parse regression** — official site HTML changed shape; the BeautifulSoup selectors in \`generate_ics.py\` need updating."
            echo "4. **Push rejected and PR fallback also failed** — verify \`pull-requests: write\` permission and that branch \`auto/refresh-schedule-${{ github.run_id }}\` doesn't already exist."
            echo "5. **Release step failed** — check tag collision (someone may have pushed a \`v1.x\` tag manually that conflicts with the auto-incremented next tag) or insufficient \`contents: write\` permission on \`GITHUB_TOKEN\`. The release action also fails if \`fifa_fan_festival_toronto_2026.ics\` is missing at upload time."
            echo ""
            echo "Re-run with \`workflow_dispatch\` once the cause is addressed."
          } >> "${GITHUB_STEP_SUMMARY}"
